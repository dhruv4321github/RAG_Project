version: "3.9"

services:
  # ──────────────────────────────────────────────
  # PostgreSQL with pgvector extension
  # ──────────────────────────────────────────────
  db:
    image: pgvector/pgvector:pg16
    container_name: advisor-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: advisor_rag
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  # FastAPI Backend
  # ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: advisor-backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/advisor_rag
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app        # Hot-reload during development
      - upload_data:/app/uploads       # Persistent upload storage
    depends_on:
      db:
        condition: service_healthy

  # ──────────────────────────────────────────────
  # React Frontend
  # ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: advisor-frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  pgdata:
  upload_data:
